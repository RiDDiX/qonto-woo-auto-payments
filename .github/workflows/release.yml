name: Create WordPress Plugin Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: openssl, json, mbstring
      
      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" | xargs -n 1 php -l
      
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Verify plugin version matches tag
        run: |
          PLUGIN_VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" qonto-woo-auto-payments.php)
          TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Plugin version ($PLUGIN_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PLUGIN_VERSION"
      
      - name: Create plugin directory structure
        run: |
          PLUGIN_SLUG="auto-payment-matcher-for-qonto"
          mkdir -p build/${PLUGIN_SLUG}
          cp qonto-woo-auto-payments.php build/${PLUGIN_SLUG}/
          cp readme.txt build/${PLUGIN_SLUG}/
          cp README.md build/${PLUGIN_SLUG}/
          cp LICENSE build/${PLUGIN_SLUG}/
      
      - name: Create ZIP archive
        run: |
          cd build
          zip -r ../auto-payment-matcher-for-qonto-${{ steps.get_version.outputs.VERSION }}.zip auto-payment-matcher-for-qonto
          cd ..
          echo "Created: auto-payment-matcher-for-qonto-${{ steps.get_version.outputs.VERSION }}.zip"
          ls -la *.zip
      
      - name: Generate changelog from commits
        id: changelog
        run: |
          echo "## Changes in v${{ steps.get_version.outputs.VERSION }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD >> CHANGELOG.md 2>/dev/null || echo "- Initial release" >> CHANGELOG.md
          cat CHANGELOG.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Auto Payment Matcher for Qonto v${{ steps.get_version.outputs.VERSION }}"
          body_path: CHANGELOG.md
          files: |
            auto-payment-matcher-for-qonto-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
